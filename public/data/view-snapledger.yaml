title: Snapledger
imgSrc: "/main-page-img/snapledger.webp"
intro: |
  Snapledger is an AI-powered expense tracking application that helps users log their spending with just one sentence. Instead of filling in multiple fields manually, users can simply type what they spent, and the app will convert it into a clear financial record. Snapledger is designed for people who want a faster, simpler, and more intuitive way to manage daily expenses.
