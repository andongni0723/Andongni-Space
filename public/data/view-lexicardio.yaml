title: Lexicardio
imgSrc: "/main-page-img/lexicardio.webp"
intro: |
    Lexicardio is mean "lexicon", "card" and "io", this is a useful application to help you learn new words. You can create your own card sets and add words by text or csv. You can also share your card to friends. The app support learn mode and test mode to help you memorize words more effectively.
